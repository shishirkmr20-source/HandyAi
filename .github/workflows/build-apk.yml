name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Default working directory is the handyai/ subdirectory — the git repo
# root is the project parent (/), but the actual Gradle Android project
# lives in handyai/. Every `run:` step below executes from handyai/.
defaults:
  run:
    working-directory: handyai

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Ensure debug keystore exists
        run: |
          mkdir -p $HOME/.android
          if [ ! -f $HOME/.android/debug.keystore ]; then
            keytool -genkey -v -keystore $HOME/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandyAi-release-apk
          path: handyai/app/build/outputs/apk/release/*.apk
          retention-days: 30
          compression-level: 0
